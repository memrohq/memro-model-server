version: '3.8'

services:
  model-server:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - ./models:/app/models
    env_file:
      - .env
    restart: always
    deploy:
      resources:
        limits:
          memory: 12G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
